<!DOCTYPE HTML>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>JS: Zadania - Zdarzenia</title>
    <style>
        #kontener {
            width: 50px;
            height: 50px;
            border: 1px solid black; 
            font-size: 16px; 
            transition: background-color 0.3s, font-size 0.2s; 
            overflow: visible; 
            margin-bottom: 30px;
        }

        .wyroznione {
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        #liczba {
            min-height: 20px;
            margin-top: 10px;
            color: red;
            font-weight: bold;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {

            // --- ZADANIE 1 ---
            const kontener = document.querySelector('#kontener');
            
            kontener.addEventListener('click', function() {
                const randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
                this.style.backgroundColor = randomColor;
            });

            kontener.addEventListener('mouseover', function() {
                this.style.fontSize = '32px';
            });

            kontener.addEventListener('mouseout', function() {
                this.style.fontSize = '16px';
            });


            // --- ZADANIE 2 ---
            const paragraf = document.querySelector('.wyroznione');

            paragraf.addEventListener('dblclick', function() {
                this.innerText = 'Powiat radomski';
            });

            paragraf.addEventListener('mouseover', function() {
                console.log('Zawartość paragrafu:', this.innerText);
            });


            // --- ZADANIE 3 ---
            const artykul = document.querySelector('#artykul');
            const liczbaDiv = document.querySelector('#liczba');
            
            let inputSize = 20; 
            artykul.size = inputSize;

            artykul.addEventListener('keydown', function(e) {
                inputSize++;
                this.size = inputSize;

              
                if (e.key >= '0' && e.key <= '9') {
                    liczbaDiv.innerText += e.key;
                }
            });

        });
    </script>
</head>
<body>

    <h2>Zadanie 1</h2>
    <div id="kontener">Filip Wojdat</div>

    <hr>

    <h2>Zadanie 2</h2>
    <p class="wyroznione">Radom</p>

    <hr>

    <h2>Zadanie 3</h2>
    <input type="text" id="artykul" placeholder="Wpisz coś...">
    <div id="liczba"></div>

</body>
</html>
